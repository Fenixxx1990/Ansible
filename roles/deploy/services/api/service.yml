---
- name: "[{{ svc_name }}] Конфигурация секрета"
  ansible.builtin.include_tasks: "../secret.yml"

- name: "[{{ svc_name }}] Выкладка сервиса"
  block:
    - name: "[{{ svc_name }}] Выкладываем сервис"  
      community.docker.docker_swarm_service:
        name: "{{ svc_name }}"
        image: lockalhost:5000/{{ svc_name }}:latest
        state: present
        networks:
          - name: "{{ networkName }}"
        publish:
          - mode: ingress
            protocol: tcp
            published_port: 3002
            target_port: 3000
        secrets:
          - secret_name: "{{ svc_name }}.env"
            filename: "/opt/app/.env"  
