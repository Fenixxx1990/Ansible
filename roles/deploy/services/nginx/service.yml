---
- name: "[{{ svc_name }}] Конфигурация конфига"
  ansible.builtin.include_tasks: "../config.yml"
  loop:
    - nginx.conf
  loop_control:
    loop_var: config_item

- name: "[{{ svc_name }}] Выкладка сервиса"
  block:
    - name: "[{{ svc_name }}] Выкладываем сервис"  
      community.docker.docker_swarm_service:
        name: "{{ svc_name }}"
        image: "nginx:{{ version }}"
        state: present
        networks:
          - name: "{{ network_name }}"
        publish:
          - mode: ingress
            protocol: tcp
            published_port: 80
            target_port: 80       
        configs:
          - config_name: nginx.conf
            filename: "/etc/nginx/nginx.conf"  