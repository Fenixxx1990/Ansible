---
- name: "[{{ svc_name }}] Выкладка сервиса"
  block:
    - name: "[{{ svc_name }}] Выкладываем сервис"  
      community.docker.docker_swarm_service:
        name: "{{ svc_name }}"
        image: "{{ registry_name }}{{ svc_name }}:{{ version }}"
        state: present
        force_update: true
        networks:
          - name: "{{ network_name }}"
        publish:
          - mode: ingress
            protocol: tcp
            published_port: 3001
            target_port: 80