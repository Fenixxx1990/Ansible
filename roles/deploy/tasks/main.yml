---
- name: Создание сети
  community.docker.docker_network:
    name: "{{ network_name }}"
    driver: overlay

- name: Выкладка сервисов
  include_tasks: 
    file: "../services/{{ item.name }}/service.yml"
    apply: 
      tags:
        - "{{ item.name }}"
  tags: always
  vars:
    svc_name: "{{ item.name }}"  
    version: "{{ item.version }}"
  loop: "{{ services }}"
