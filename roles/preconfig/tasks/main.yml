---
- name: Установка Docker
  block:
    - name: Добавление universe
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_facts['distribution_release'] }} universe"
        state: present

    - name: Установка дополнительных пакетов
      apt:
        name:
          - ca-certificates
          - curl
          - python3-pip
        update_cache: true
        cache_valid_time: 86400

    - name: Создание репозитория для Docker GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Загрузка Docker's official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Установка стабильного репозитория
      apt_repository:
        repo: >
          deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present
        update-cache: true

    - name: Установка Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Проверяем что Docker установлен и перезагружен
      service:
        name: docker
        state: restarted
        enabled: true

- name: Настройка дополнительных пакетов python
  block:
    - name: Установка pip пакетов
      pip:
        name: docker
        
- name: Завершение установки
  block:
    - name: Добавление пользователя в группу Docker
      user:
        name: "{{ ansible_facts['user_id'] }}"
        groups: docker
        append: true

    - name: Перезагрузка
      reboot: